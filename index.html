<!doctype html>
<html lang="pt-br">
  <head>
    <link rel="stylesheet" href="styles.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevClub - Money converter</title>
  </head>
  <body>
    <img src="./assets/logo.gif" alt="logo-devclub-converter" class="logo"/>
    <main>
      <label>
        Convert <b>from:</b>
        <select class="currency-convert-from-select">
          <option class="real">R$ Brazilian Real</option>
        </select>
      </label>

      <label>
        <b>To:</b>
        <select class="currency-select">
          <option value="dolar">US$ American Dolar</option>
          <option value="euro">€ Euro</option>
          <option value="libra">£ Libra</option>
        </select>
      </label>

      <label>
        Value
        <input placeholder="R$ 10.000,00" class="input-currency" type="number"/>
      </label>

      <button class="convert-button">Convert</button>

      <section>
        <div class="currency-box">
            <img src="./assets/REAL.png" alt="currency-to-convert" class="flag">
            <p class="currency">Real</p>
            <p class="value" id="Real">R$ 0,00</p>
        </div>

        <img src="./assets/arrow.png" alt="arrow" class="arrow">

        <div class="currency-box-to-convert">
            <img src="./assets/DOLAR.png" alt="converted-currency" class="flag" id="flag-name">
            <p class="currency" id="currency-name">Dolar</p>
            <p class="value-to-convert">US$ 0.00</p>
        </div>
      </section>
    </main>
    
  </body>
  <script src="scripts.js"></script>
</html>
